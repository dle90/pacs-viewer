<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Medisync PACS Viewer</title>
<link rel="stylesheet" href="styles.css" />
<template id="__bundler_thumbnail">
  <svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
    <rect width="100" height="100" fill="#0f1828" />
    <rect x="30" y="30" width="40" height="40" rx="4" fill="none" stroke="#5acce6" stroke-width="3" />
    <circle cx="50" cy="50" r="11" fill="none" stroke="#5acce6" stroke-width="3" />
    <path d="M50 39 v22 M39 50 h22" stroke="#5acce6" stroke-width="2" />
  </svg>
</template>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" src="tweaks-panel.jsx"></script>

<script type="text/babel" src="js/viewport.jsx"></script>
<script type="text/babel" src="js/app.jsx"></script>
<script type="text/babel" data-presets="react">
  const mount = () => {
    if (!window.PACSApp) { setTimeout(mount, 30); return; }
    ReactDOM.createRoot(document.getElementById("root")).render(<window.PACSApp />);
  };
  mount();
</script>
