# Local dev — runs the SAME nginx 'serve' image as Railway (parity), config via
# env. (Prod CDN path is separate: build.ps1 -> dist -> deploy/.)
#
#   docker compose up -d --build   ->  http://localhost:3000
services:
  viewer:
    build:
      context: .
      dockerfile: Dockerfile.railway
      target: serve
    image: medisync-pacs-viewer
    container_name: medisync-pacs-viewer
    ports:
      - "${VIEWER_PORT:-3000}:8080"
    environment:
      # Browser-reachable DICOMweb endpoint = pacs-dicomweb-proxy (cross-origin).
      # Defaults to the local proxy (PROXY_PORT); the browser hits it from the host,
      # so changing PROXY_PORT must change this too. Override DICOMWEB_ROOT to point
      # the local viewer at a remote backend, e.g.:
      #   DICOMWEB_ROOT=https://pacs-dicomweb-proxy-production.up.railway.app/wado
      DICOMWEB_ROOT: "${DICOMWEB_ROOT:-http://localhost:${PROXY_PORT:-8080}/wado}"
    restart: unless-stopped
